name = "documint-ai"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Assets for static files served by the worker
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXTAUTH_URL = "https://documintai.dev"
NEXT_PUBLIC_APP_URL = "https://documintai.dev"
NODE_ENV = "production"
NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "" # Set in dashboard or via wrangler secret
CF_PAGES = "1" # Signals Cloudflare runtime to sandbox.ts and runtime.ts

# Additional vars to set in Cloudflare Dashboard → Workers & Pages → Settings → Variables:
#   UPSTASH_REDIS_REST_URL
#   UPSTASH_REDIS_REST_TOKEN
#   RESEND_API_KEY
#   EMAIL_FROM
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   STRIPE_PRICE_ID_STARTER
#   STRIPE_PRICE_ID_PRO
#   STRIPE_PRICE_ID_TEAM
#   GOOGLE_API_KEY
#   GITHUB_CLIENT_ID / GITHUB_CLIENT_SECRET (if using GitHub OAuth)
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (if using Google OAuth)
#   GITLAB_CLIENT_ID / GITLAB_CLIENT_SECRET (if using GitLab OAuth)
#   AUTH0_CLIENT_ID / AUTH0_CLIENT_SECRET / AUTH0_ISSUER (if using Auth0)
#   ADMIN_EMAIL

# Secrets (sensitive values — set via: wrangler secret put SECRET_NAME)
#   NEXTAUTH_SECRET
#   DATABASE_URL (Prisma Accelerate URL for edge compat)
#   DIRECT_URL (if used for migrations)
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   ENCRYPTION_KEY (if used)
